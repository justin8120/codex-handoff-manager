name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug formatting environment
        run: |
          echo "runner OS: $RUNNER_OS"
          node -v
          npm -v
          npx prettier --version
          git config --get core.autocrlf || true
          cat .gitattributes
          cat .prettierrc
          file .prettierrc README.md package.json vite.config.ts src/App.tsx scripts/browser-walkthrough.mjs
          git status --short
          npx prettier --check . --log-level debug

      - name: Validate
        run: npm run validate
