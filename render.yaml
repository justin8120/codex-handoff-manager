services:
  - type: web
    name: smart-diet-recommendation-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_PROVIDER
        value: auto
      - key: AI_FALLBACK_ENABLED
        value: true
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: WEB_VERIFY_ENABLED
        value: false
      - key: WEB_VERIFY_PROVIDER
        value: gemini_grounding
      - key: FRONTEND_ORIGIN
        value: http://localhost:5173,https://your-username.github.io
